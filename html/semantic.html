<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!--Semantic membuat elemen semakin jelas tugas-->

    <!--Semantic HTML isinya :

    1. <header> = digunakan untuk area atas (judul web atau nama web). salah satu kelompok dari navbar. => didefinisikan hanya sekali
    2. <nav> = digunakan untuk navigation (ex. home, beranda, dll). => didefinisikan hanya sekali
    3. <main> = digunakan untuk body utama pada sebuah halaman. => didefinisikan hanya sekali
    4. <section> = digunakan untuk topik tertentu. => boleh lebih dari satu
    5. <article> = optional khusus untuk konten yang panjang.
    6. <aside> = konten tambahan (ex. berita, iklan, dll)
    7. <footer> = kaki untuk copyright, footer. => didefinisikan hanya sekali

    -->

    <header>
        <!--memberikan logo bisa pake image atau header-->
        <nav>
            <ul>
                <li>Home</li>
                <li>Service</li>
                <li>Product</li>
                <li>Gallery</li>
                <li>Contact</li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="product"></section>
        <!--masukkan berupa card-->
        <section id="myservice"></section>
        <!--jelaskan tentang service ada apa aja-->
        <section id="gallery"></section>
        <!--tampilkan gambar-->
        <section id="article"></section>
        <!--article yang panjang pakai lorem-->
        <aside>
            <!--berita-->
            <!--iklan-->
        </aside>
    </main>
    <footer>
        <!--isinya bisa copyright dan medsos-->
    </footer>
    
</body>
</html>
