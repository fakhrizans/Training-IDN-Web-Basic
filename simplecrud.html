<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap");

      * {
        padding: 0;
        margin: 0;
        font-family: "Google Sans", sans-serif;
      }

      .container {
        width: 80dvw;
        min-height: 40dvh;
        margin: 24px;
        padding: 24px;
        /* border: 0.4px #4e4e4e50 solid; */
      }

      .card {
        width: 96%;
        border: 0.4px #4e4e4e50 solid;
        padding: 24px;
        margin-bottom: 24px;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: 2fr 2fr 1fr;
        gap: 16px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        justify-content: end;
        gap: 16px;
      }

      input,
      button {
        padding: 8px;
      }

      .table-list {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 0.4px #4e4e4e60 solid;
        padding: 16px 8px;
      }

      .img-product {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1 style="margin-bottom: 24px">
          Simple CRUD HTML, CSS dan Vanilla JS
        </h1>
        <form id="form">
          <div class="grid-3">
            <div class="form-group">
              <label for="">Product Name</label>
              <input type="number" id="id" hidden>
              <input
                type="text"
                name="product_name"
                id="productName"
                placeholder="ex: Sabun"
              />
            </div>

            <div class="form-group">
              <label for="">Image Product</label>
              <input
                type="text"
                name="image_product"
                id="imageProduct"
                placeholder="image url (https://...."
              />
            </div>
            <div class="form-group">
              <button type="submit">Add</button>
            </div>
          </div>
        </form>
      </div>
      <div class="card">
        <table class="table-list">
          <thead>
            <th>Product Name</th>
            <th>Image</th>
            <th>Action</th>
          </thead>
          <tbody id="listData">
            <tr>
              <td>Sandal</td>
              <td>
                <img
                  src="https://loremflickr.com/1382/151?lock=2465999341565474"
                  class="img-product"
                  alt=""
                />
              </td>
              <td>
                <button onclick="edit">Edit</button>
                <button onclick="edit">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>

  <script>
    const api = "https://69fc3739fce564e25917772c.mockapi.io/product";
    const list = document.getElementById("listData");
    const form = document.getElementById("form");


    // Fungsi untuk get data
    function getData() {
      fetch(api) // Mengambil API
        .then((res) => res.json()) // Mengubah response menjadi json
        .then((data) => {
          list.innerHTML = "";
          data.forEach((item) => {
            list.innerHTML += `
                <tr>
                    <td>${item.product_name}</td>
                    <td>
                        <img src="${item.image}"
                        class= "img-product"
                        alt="">
                    </td>
                    <td>
                        <button onclick="editData('${item.id}', '${item.product_name}', '${item.image}')">Edit</button>
                        <button onclick="hapusData('${item.id}')">Delete</button>
                    </td>
                </tr>
                `
          });
        });
    }

    // fungsi yang berjalan saat form ditambahkan data
    form.addEventListener("submit", function(e){
        // agar tidak reload saaat menyimpan data atau mengedit data.
        e.preventDefault()

        // ambil semua nilai yang akan ditambahkan dari form
        const id = document.getElementById("id").value
        const product_name = document.getElementById("productName").value
        const image= document.getElementById("imageProduct").value

        // siapkan data yang akan dikirimkan (sesuaikan dengan field di API)
        const body = JSON.stringify({product_name, image})
        if(id === "") {
            // jika idnya tidak ada maka akan mengirimkan data (methode POST)
            fetch(api, {
                method: "POST",
                headers: {"Content-Type" : "application/json"},
                body : body
                // jika data sudah dikirim, selanjutnya buat form nya menjadi kosong. (kalau sudah jadi kereset)
            }) .then(() => {
                resetForm(); // mengosongkan form
                getData(); // refresh datanya.
            });
        } else {
            fetch(api + "/" + id, {
                method: "PUT",
                headers: {"Content-Type" : "application/json"},
                body : body
                // jika data sudah dikirim, selanjutnya buat form nya menjadi kosong. (kalau sudah jadi kereset)
            }) .then(() => {
                resetForm(); // mengosongkan form
                getData(); // refresh datanya.
            });
        }
    })

    function editData(id, product_name, image) {
        document.getElementById("id").value = id
        document.getElementById("productName").value = product_name
        document.getElementById("imageProduct").value = image
    }

    function hapusData(id) {
        if(confirm("Yakin mau dihapus?")){
            fetch(api + "/" + id, {
                method : "Delete"
            }).then(() => {
                resetForm(); // mengosongkan form
                getData(); // refresh datanya.
            });
        }
    }


    // untuk menghapus form agar kosong
    function resetForm(){
        form.reset();
        document.getElementById("id").value = 0 // yang ini id yang type number dan hidden
    }

    getData();

  </script>
</html>
